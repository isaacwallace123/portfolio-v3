# The whole portfolio network with one command: `make up` (or `docker compose up -d --build`).
# Configuration comes from `.env` (copy `.env.example`). The cyberlab image builds from its own
# repo, expected as a sibling directory (override CYBERLAB_DIR in .env if yours lives elsewhere).

name: isaacwallace

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-iw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iw-dev-only}
      POSTGRES_DB: ${POSTGRES_DB:-iw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iw} -d ${POSTGRES_DB:-iw}"]
      interval: 3s
      timeout: 3s
      retries: 20

  # The dedicated identity service (auth.isaacwallace.dev) — its own image; issues the SSO cookie and
  # runs the OAuth flow. This is what every site calls for sign-in, /auth/me, sessions, and roles.
  auth-service:
    build: ./apps/auth-service
    init: true
    ports:
      - "${AUTH_SERVICE_PORT:-5170}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${API_ENV:-Development}
      ConnectionStrings__Postgres: Host=db;Port=5432;Database=${POSTGRES_DB:-iw};Username=${POSTGRES_USER:-iw};Password=${POSTGRES_PASSWORD:-iw-dev-only}
      Auth__AdminEmails__0: ${ADMIN_EMAIL:-goosewal@gmail.com}
      # OAuth is optional locally — leave blank and use dev-login. Fill in .env to test the real flow.
      Auth__Google__ClientId: ${GOOGLE_CLIENT_ID:-}
      Auth__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET:-}
      Auth__GitHub__ClientId: ${GITHUB_CLIENT_ID:-}
      Auth__GitHub__ClientSecret: ${GITHUB_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy

  # The general application API (api.isaacwallace.dev) — non-auth data. Minimal today; its own image,
  # kept separate from auth so the two deploy and scale independently.
  api:
    build: ./apps/api
    init: true
    ports:
      - "${API_PORT:-5180}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${API_ENV:-Development}
      ConnectionStrings__Postgres: Host=db;Port=5432;Database=${POSTGRES_DB:-iw};Username=${POSTGRES_USER:-iw};Password=${POSTGRES_PASSWORD:-iw-dev-only}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5180}
        NEXT_PUBLIC_AUTH_API_URL: ${NEXT_PUBLIC_AUTH_API_URL:-http://localhost:5170}
        NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-http://localhost:3005}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-http://localhost:3004}
    init: true
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 5
    depends_on:
      auth-service:
        condition: service_healthy

  cyberlab:
    build:
      context: .
      dockerfile: apps/cyberlab/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5180}
        NEXT_PUBLIC_AUTH_API_URL: ${NEXT_PUBLIC_AUTH_API_URL:-http://localhost:5170}
        NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-http://localhost:3005}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-http://localhost:3004}
    init: true
    ports:
      - "${CYBERLAB_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 5
    depends_on:
      auth-service:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5180}
        NEXT_PUBLIC_AUTH_API_URL: ${NEXT_PUBLIC_AUTH_API_URL:-http://localhost:5170}
        NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-http://localhost:3005}
    init: true
    ports:
      - "${ADMIN_PORT:-3004}:3000"
    healthcheck:
      # admin returns 200 even for anon (the gate is client-side), so / is a fine liveness probe
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 5
    depends_on:
      auth-service:
        condition: service_healthy

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5180}
        NEXT_PUBLIC_AUTH_API_URL: ${NEXT_PUBLIC_AUTH_API_URL:-http://localhost:5170}
        NEXT_PUBLIC_HOME_URL: ${NEXT_PUBLIC_HOME_URL:-http://localhost:3000}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-http://localhost:3004}
    init: true
    ports:
      - "${AUTH_PORT:-3005}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 5
    depends_on:
      auth-service:
        condition: service_healthy

volumes:
  dbdata:
