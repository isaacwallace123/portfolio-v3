version: 2

multi-ecosystem-groups:
  application-dependencies:
    schedule:
      interval: weekly
    labels: [dependencies]
  delivery-toolchain:
    schedule:
      interval: weekly
    labels: [dependencies, infrastructure]

updates:
  - package-ecosystem: npm
    directory: /
    patterns: ["*"]
    multi-ecosystem-group: application-dependencies
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: nuget
    directory: /
    patterns: ["*"]
    multi-ecosystem-group: application-dependencies
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    patterns: ["*"]
    multi-ecosystem-group: delivery-toolchain
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: docker
    directories:
      - /apps/web
      - /apps/admin
      - /apps/cyberlab
      - /apps/homelab
      - /apps/ailab
      - /apps/auth
      - /apps/api
    patterns: ["*"]
    multi-ecosystem-group: delivery-toolchain
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
