# TEMPLATE — do not commit real values. This lives OUTSIDE deploy/k8s/ so ArgoCD never applies
# plaintext. Fill it in, seal it, and commit only the sealed output:
#
#   cp portfolio-secrets.example.yaml portfolio-secrets.yaml   # then edit the values
#   kubeseal --format yaml --controller-namespace kube-system \
#     < portfolio-secrets.yaml > ../k8s/sealed-secret.yaml
#   # commit deploy/k8s/sealed-secret.yaml — the SealedSecrets controller decrypts it in-cluster.
#
# Keep POSTGRES_PASSWORD and the password inside ConnectionStrings__Postgres identical.
apiVersion: v1
kind: Secret
metadata:
  name: portfolio-secrets
  namespace: portfolio
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE-ME-strong-random"
  ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=iw;Username=iw;Password=CHANGE-ME-strong-random"
  # OAuth credentials from the Google Cloud console + a GitHub OAuth app. Prod callback URLs
  # (the auth service lives on the auth domain now):
  #   https://auth.isaacwallace.dev/signin-google   and   https://auth.isaacwallace.dev/signin-github
  Auth__Google__ClientId: "xxxxxxxx.apps.googleusercontent.com"
  Auth__Google__ClientSecret: "GOCSPX-xxxxxxxx"
  Auth__GitHub__ClientId: "Iv1.xxxxxxxx"
  Auth__GitHub__ClientSecret: "xxxxxxxx"
