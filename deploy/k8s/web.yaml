# The main portfolio site → isaacwallace.dev. Stateless; the NEXT_PUBLIC_* API/account URLs are
# baked at image-build time in CI (see .github/workflows/publish.yml), so the image is environment-
# specific and needs no runtime config.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: portfolio
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        node-role.kubernetes.io/apps: "true"
      containers:
        - name: web
          image: ghcr.io/isaacwallace123/portfolio-web:latest
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: portfolio
  labels:
    app: web
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 3000
