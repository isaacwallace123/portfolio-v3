# The general application API → api.isaacwallace.dev. Non-auth data only; identity lives in the
# dedicated auth service (auth-service.yaml). Minimal today — its own image, deployed separately so
# the two concerns scale independently. Stateless (no Data Protection keyring here), so it scales
# horizontally with a normal rolling update.
#
# The Postgres connection string is wired in ready for the first data endpoint; the current build
# only serves /health and does not open a connection.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: portfolio
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        node-role.kubernetes.io/apps: "true"
      containers:
        - name: api
          image: ghcr.io/isaacwallace123/portfolio-api:latest
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1654
            runAsGroup: 1654
            capabilities:
              drop: ["ALL"]
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: ConnectionStrings__Postgres
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: portfolio
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 80
      targetPort: 8080
