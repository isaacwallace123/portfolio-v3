# auth.isaacwallace.dev — the identity portal (sign-in + account UX). Stateless Next.js; the actual
# OAuth + cookie issuance happens in the dedicated auth service (auth-service.yaml), reached under the
# same host via tunnel path-routing (/auth/*, /signin-*). NEXT_PUBLIC_* baked at build time in CI.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: portfolio
  labels:
    app: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      nodeSelector:
        node-role.kubernetes.io/apps: "true"
      containers:
        - name: auth
          image: ghcr.io/isaacwallace123/portfolio-auth:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /login
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: portfolio
  labels:
    app: auth
spec:
  selector:
    app: auth
  ports:
    - name: http
      port: 80
      targetPort: 3000
